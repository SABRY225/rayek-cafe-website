<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>كافيه الرايق | تجربة 3D</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>

    <header class="navbar">
        <div class="logo"> كافيه <span>الرايق</span></div>
    </header>

    <main class="hero-section">
        <div class="overlay"></div>
        <div id="canvas-container"></div>

<div class="hero-content">
            <div class="badge">أجود أنواع البن المختص</div>
            <h1 class="main-title">مشروبك <span class="highlight">الرايق</span> يا رايق</h1>
            <p class="description">
                نقدم لك تجربة قهوة فريدة من نوعها، محضرة بكل شغف من حبوب البن المحمصة بعناية لتناسب ذوقك الرفيع.
            </p>
            <div class="cta-buttons">
                <button class="btn-primary" id="orderBtn">تحضير المشروب</button>
                <button class="btn-secondary" id="menuBtn">استكشف المنيو</button>
            </div>
        </div>
    </main>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    <script type="module" src="script.js"></script>
</body>
</html>
