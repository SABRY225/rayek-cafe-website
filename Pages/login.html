<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../css/login.css">
</head>
<body>
    <header class="main-header">
        <div class="brand">
            <div class="logo-box"><i class="fa-solid fa-mug-saucer"></i></div>
            <h2>كافيه الرايق</h2>
        </div>
        <div class="admin">
            <span>بوابة الإدارة</span>
            <div class="admin-icon"><i class="fa-solid fa-user-shield"></i></div>
        </div>
    </header>
    <main class="main-content">
        <div class="login-container">
            <div class="profile-overlay">
                <div class="image-border">
                    <img src="../assets/images/photo.jpg" alt="Profile">
                </div>
            </div>

            <h1 class="main-title">دخول الإدارة</h1>
            <p class="sub-title">مرحباً بك مجدداً، يرجى إدخال بريدك الإلكتروني للوصول إلى لوحة التحكم</p>

            <div class="form-wrapper">
                <form>
                    <div class="input-group">
                        <label>البريد الإلكتروني</label>
                        <div class="input-field">
                            <input type="email" id="email" placeholder="admin@rayeq.com">
                            <i class="fa-regular fa-envelope"></i>
                        </div>
                    </div>

                    <button type="button" id="btnSubmit" class="submit-btn">
                        إرسال كود التحقق 
                        <i class="fa-solid fa-paper-plane"></i>
                    </button>
                </form>
            </div>

            <a href="#" class="forgot-link">نسيت بيانات الدخول؟ تواصل مع الدعم الفني</a>
        </div>
    </main>

    <footer class="main-footer">
        <p class="copyright">© 2024 كافيه الرايق. جميع الحقوق محفوظة.</p>
    </footer>

</body>
</html>


    <script src="../scripts/login.js"></script>

</body>
</html>
