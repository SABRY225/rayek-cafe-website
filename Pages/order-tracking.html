<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>كافيه الرايق | معمل القهوة الاحترافي</title>
    <!-- Font Awesome 6 (Professional Icons) -->
    <link rel="stylesheet" href="../assets/fontawesome/css/all.min.css">
    <link rel="stylesheet" href="../css/order-tracking-style.css">
</head>
<body>
    <div class="container">
 <div class="timer-container" id="timer-container">
    <div class="circle-timer">
        <svg class="progress-ring" width="160" height="160">
            <circle class="progress-ring__circle"
                stroke="#d35400"
                stroke-width="4"
                fill="transparent"
                r="70"
                cx="80"
                cy="80"/>
        </svg>
        
        <div class="time-display">
            <span id="minutes">00</span>:<span id="seconds">00</span>
            <small>دقيقة</small>
        </div>
    </div>
    <p class="status-text">جاري تحضير مشروبك بكل حب...</p>
</div>

        <div class="message-section">
            <h1>طلبك في أيدٍ أمينة! ☕</h1>
            <p>شكراً لاختيارك <span style="color: #e67e22;font-weight: bold;">كافيه الرايق</span>. طلبك الآن قيد التحضير وسيكون جاهزاً قريباً.</p>
        </div>

        <div class="order-card">
            <div class="info-row">
                <div class="info-item">
                    <label>رقم الطلب</label>
                    <span class="value" id="orderId">#12345</span>
                </div>
                <div class="info-item">
                    <label>الوقت المتوقع</label>
                    <span class="value" id="orderTime">20-30 دقيقة</span>
                </div>
            </div>
            <div class="footer-note">
                 يتم الآن تجهيز قهوتك المختصة
            </div>
        </div>
    </div>
    <div id="readyMessage" style="display:none" class="ready-msg">
مشروبك جاهز يا رايق ☕
</div>
    <script src="../scripts/order-tracking-script.js"></script>
</body>
</html>
